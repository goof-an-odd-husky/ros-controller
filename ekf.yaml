imu_filter_node:
  ros__parameters:
    use_mag: true
    publish_tf: false
    world_frame: "enu"
    orientation_stddev: 0.05

ekf_filter_node:
  ros__parameters:
    frequency: 30.0
    sensor_timeout: 0.1
    two_d_mode: true
    publish_tf: true
    
    map_frame: map
    odom_frame: odom
    base_link_frame: base_link
    world_frame: odom

    odom0: /platform/odom
    # [x, y, z, roll, pitch, yaw, vx, vy, vz, vroll, vpitch, vyaw, ax, ay, az]
    odom0_config: [false, false, false, false, false, false, true, true, false, false, false, true, false, false, false]
    odom0_queue_size: 10
    odom0_nodelay: true

    imu0: /imu/data
    # [x, y, z, roll, pitch, yaw, vx, vy, vz, vroll, vpitch, vyaw, ax, ay, az]
    imu0_config: [false, false, false, true, true, true, false, false, false, true, true, true, true, true, false]
    imu0_nodelay: true
    imu0_queue_size: 10
    imu0_relative: true
    imu0_remove_gravitational_acceleration: true
